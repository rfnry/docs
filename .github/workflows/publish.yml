name: Publish to npm

on:
  release:
    types: [published]

jobs:
  publish:
    if: startsWith(github.event.release.tag_name, 'rfnry-docs-v')
    runs-on: ubuntu-latest
    environment: npm
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"
      - run: npm ci
      - run: npm run build -w @example/minimal
      - run: npm run build -w @example/i18n-versioned
      - run: npm publish -w rfnry-docs --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
